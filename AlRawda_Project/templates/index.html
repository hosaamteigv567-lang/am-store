<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>fox store</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; text-align: center; padding: 30px; }
        .btn-buy { background-color: #25D366; color: rgb(180, 240, 15); padding: 10px 20px; border-radius: 8px; text-decoration: none; display: inline-block; font-weight: bold; margin-top: 10px; }
        
        /* استايل زرار معرض الصور الجديد */
        .btn-gallery { background-color: #007bff; color: white; padding: 12px 24px; border-radius: 8px; text-decoration: none; display: inline-block; font-weight: bold; margin-top: 15px; font-size: 16px; border: none; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-gallery:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <h1>fox store</h1>
    <p>Welcome to our online store! We offer a wide range of products to meet your needs. Browse through our categories and find the perfect items for you.</p>    
    
    <img src="https://picsum.photos/200/200?random=3" style="width: 200px; height: 200px; border-radius: 8px; margin-top: 20px;"><br>
    
    <!-- زرار الواتساب بتاعك -->
    <a href="https://wa.me/201210494181?text=مرحبا مروان اريد شراء منتج" class="btn-buy">Buy Now</a>
    <br>

    <!-- 🌟 الزرار السحري الجديد: مجرد ما تدوس عليه يفتح صفحة الصور الديناميكية 🌟 -->
    <a href="/gallery" class="btn-gallery">🖼️ فتح صفحة معرض الصور والمنتجات المرفوعة</a>
    <br>

    <input type="text" placeholder="Search for products..." style="padding: 10px; width: 80%; margin-top: 20px; border-radius: 8px; border: 1px solid #ccc;">
    <br>
    <button onclick="window.location.href='/shop'" style="background-color: #ff8c00; color: white; padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; margin-top: 10px;">Go to Invoice</button>
    <br>

</body>
</html>
